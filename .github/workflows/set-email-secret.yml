name: Configurar secret de e-mail (SendGrid) no Fly

# Disparo manual pela aba Actions do GitHub.
# Usa o FLY_API_TOKEN (que já é dono do app) para gravar a chave do SendGrid
# como secret no Fly.io, sem expor a chave no código.
on:
  workflow_dispatch:

jobs:
  set-secret:
    name: Gravar SendGrid__ApiKey no Fly
    runs-on: ubuntu-latest
    steps:
      - name: Instalar flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Gravar secret SendGrid__ApiKey
        run: flyctl secrets set "SendGrid__ApiKey=${{ secrets.SENDGRID_API_KEY }}" -a studio-lash-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
